name: personal-brain
version: 1.1.0
description: TheBrain MCP Server - FastMCP Python implementation

# Package now lives at the repo root (de-nested from python/) — `pip install -e .` and the
# module invocation below both resolve from root. NOTE: fastmcp.json is the primary deploy
# config; this legacy .fastmcp.yaml is kept in sync until confirmed unused, then removable.
install: pip install -e .

# Command to run the server
command: python -m thebrain_mcp.server

# Environment variables (these should be set in FastMCP Cloud UI)
environment:
  THEBRAIN_API_KEY: ${THEBRAIN_API_KEY}
  THEBRAIN_DEFAULT_BRAIN_ID: ${THEBRAIN_DEFAULT_BRAIN_ID}
  THEBRAIN_VAULT_BRAIN_ID: ${THEBRAIN_VAULT_BRAIN_ID}
  BTCPAY_HOST: ${BTCPAY_HOST}
  BTCPAY_STORE_ID: ${BTCPAY_STORE_ID}
  BTCPAY_API_KEY: ${BTCPAY_API_KEY}
  BTCPAY_TIER_CONFIG: ${BTCPAY_TIER_CONFIG}
  BTCPAY_USER_TIERS: ${BTCPAY_USER_TIERS}
  SEED_BALANCE_SATS: ${SEED_BALANCE_SATS}
  TOLLBOOTH_OTS_ENABLED: ${TOLLBOOTH_OTS_ENABLED}
  TOLLBOOTH_OTS_CALENDARS: ${TOLLBOOTH_OTS_CALENDARS}

# Python version
runtime:
  python: "3.12"
# redeploy: 2026-03-04 tollbooth-dpyc 0.1.73 (obsolete practices metadata + patron keyring guidance)
